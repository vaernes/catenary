# Limine Configuration for Catenary OS

# Base Protocol Revision (Must be 1 for modern features)
base_revision: 1

# Menu Timeout (seconds)
timeout: 3

# Main Boot Entry
/Catenary OS
    protocol: limine
    kernel_path: boot():/boot/kernel.elf
    module_path: boot():/modules/netd.elf
    module_path: boot():/modules/storaged.elf
    module_path: boot():/modules/dashd.elf
    resolution: 800x600x32
